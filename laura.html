<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAURA GOODSTONE - Work in Progress</title>

    <!-- Cargamos una tipografía estilo Country/Western desde Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: -webkit-fill-available; 
            position: relative;
        }

        html { height: -webkit-fill-available; }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('laura.jpeg');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        @media (max-width: 768px) {
            body::before {
                background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                            url('lauraph.JPG');
                background-size: cover;
                background-position: center;
            }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            filter: drop-shadow(0 0 5px rgba(210, 180, 140, 0.3));
        }

        .footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            z-index: 10;
            /* Tipografía estilo Country / Máquina de escribir antigua */
            font-family: 'Special Elite', 'Courier New', serif;
            color: #ddd;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
        }

        .footer .wip {
            font-size: 24px; /* Leyenda más grande */
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .footer a {
            color: #fff;
            text-decoration: none;
            font-size: 18px; /* Mail más grande */
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        @media (max-width: 768px) {
            .footer .wip { font-size: 18px; }
            .footer a { font-size: 14px; }
            .footer { bottom: 30px; }
        }
    </style>
</head>

<body>

<canvas id="canvas1"></canvas>

<div class="footer">
    <div class="wip">WORK IN PROGRESS</div>
    <div>
        <a href="mailto:lauragoodstone01@gmail.com">
            lauragoodstone01@gmail.com
        </a>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas1');
const ctx = canvas.getContext('2d');

let particleArray = [];
// El radio ahora es 0 por defecto para que no afecte si no hay interacción activa
const mouse = { x: null, y: null, radius: 0, active: false };
const MAX_RADIUS = 130; 

function setCanvasSize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
setCanvasSize();

// INTERACCIÓN: Solo activa el radio si hay movimiento o presión
function activateMouse(x, y) {
    mouse.x = x;
    mouse.y = y;
    mouse.radius = MAX_RADIUS;
    mouse.active = true;
}

function deactivateMouse() {
    mouse.radius = 0;
    mouse.active = false;
}

window.addEventListener('mousemove', (e) => activateMouse(e.x, e.y));
window.addEventListener('mousedown', () => mouse.active = true);
window.addEventListener('mouseup', () => mouse.active = true); // Se mantiene activo si se mueve
window.addEventListener('mouseout', deactivateMouse);

window.addEventListener('touchstart', (e) => {
    activateMouse(e.touches[0].clientX, e.touches[0].clientY);
}, {passive: true});

window.addEventListener('touchmove', (e) => {
    activateMouse(e.touches[0].clientX, e.touches[0].clientY);
}, {passive: true});

window.addEventListener('touchend', deactivateMouse);

class Particle {
    constructor(x, y) {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.destX = x;
        this.destY = y;
        // Tamaño pequeño (mitad del original aprox)
        this.size = Math.random() * 1.5 + 0.5;

        const sandColors = ['#e3cba0', '#d2b48c', '#c2a075'];
        this.color = sandColors[Math.floor(Math.random() * sandColors.length)];
        this.ease = 0.06;
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }

    update() {
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let distance = Math.sqrt(dx * dx + dy * dy);

        // Solo repele si el radio es mayor a 0 (interacción activa)
        if (mouse.radius > 0 && distance < mouse.radius) {
            let force = (mouse.radius - distance) / mouse.radius;
            let dirX = dx / distance;
            let dirY = dy / distance;
            this.x -= dirX * force * 6;
            this.y -= dirY * force * 6;
        } else {
            this.x += (this.destX - this.x) * this.ease;
            this.y += (this.destY - this.y) * this.ease;
        }
    }
}

const logoImage = new Image();
logoImage.src = 'logo.png';

logoImage.onload = () => {
    initWithLogo();
    animate();
};

function initWithLogo() {
    particleArray = [];
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;

    let scale = 0.65;
    if (window.innerWidth < 768) scale = 0.45;

    const w = logoImage.width * scale;
    const h = logoImage.height * scale;
    const xPos = (canvas.width - w) / 2;
    const yPos = (canvas.height - h) / 2;

    tempCtx.drawImage(logoImage, xPos, yPos, w, h);
    const data = tempCtx.getImageData(0, 0, canvas.width, canvas.height);

    // Volvemos a gap 4 para que la forma del logo/texto sea clara
    for (let y = 0; y < data.height; y += 4) {
        for (let x = 0; x < data.width; x += 4) {
            const i = (y * 4 * data.width) + (x * 4);
            if (data.data[i + 3] > 128) {
                particleArray.push(new Particle(x, y));
            }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < particleArray.length; i++) {
        particleArray[i].update();
        particleArray[i].draw();
    }
    requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
    setCanvasSize();
    initWithLogo();
});
</script>

</body>
</html>
