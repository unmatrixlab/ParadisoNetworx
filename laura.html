<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAURA GOODSTONE - Work in Progress</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; 
            background-image: url('laura.jpeg'); 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        @media (max-width: 768px) {
            body {
                background-image: url('lauraph.JPG');
            }
        }

        canvas {
            filter: drop-shadow(0 0 10px rgba(210, 180, 140, 0.5));
        }

        /* TEXTO INFERIOR */
        #footerText {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #999;
            font-family: Arial, sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<canvas id="canvas1"></canvas>
<div id="footerText">WORK IN PROGRESS · contacto@mail.com</div>

<script>
const canvas = document.getElementById('canvas1');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particleArray = [];

/* INTERACCIÓN MÁS SUTIL */
const mouse = { x: null, y: null, radius: 80 };

window.addEventListener('mousemove', (event) => {
    mouse.x = event.x;
    mouse.y = event.y;
});

/* TOUCH MÁS ORGÁNICO */
window.addEventListener('touchmove', (event) => {
    const touch = event.touches[0];
    mouse.x = touch.clientX;
    mouse.y = touch.clientY;
});

class Particle {
    constructor(x, y, color = null) {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.destX = x;
        this.destY = y;
        this.size = Math.random() * 2 + 0.5;
        this.baseX = this.x;
        this.baseY = this.y;

        const sandColors = ['#e3cba0', '#d2b48c', '#c2a075'];
        this.color = color || sandColors[Math.floor(Math.random() * sandColors.length)];

        this.density = (Math.random() * 20) + 1;
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.closePath();
        ctx.fill();
    }

    update() {
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < mouse.radius) {
            this.x -= dx * 0.02;
            this.y -= dy * 0.02;
        } else {
            this.x += (this.destX - this.x) * 0.02;
            this.y += (this.destY - this.y) * 0.02;
        }
    }
}

/* LOGO */
const logoImage = new Image();
logoImage.src = 'logo.png';

/* TEXTO CANVAS */
const textCanvas = document.createElement('canvas');
const textCtx = textCanvas.getContext('2d');

logoImage.onload = () => {
    initWithLogo();
    initText();
    animate();
};

function initWithLogo() {
    particleArray = [];

    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');

    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;

    /* LOGO MÁS PEQUEÑO EN MÓVIL */
    let scale = window.innerWidth < 768 ? 0.35 : 0.6;

    const imgWidth = logoImage.width * scale;
    const imgHeight = logoImage.height * scale;

    const xPos = (tempCanvas.width - imgWidth) / 2;
    const yPos = (tempCanvas.height - imgHeight) / 2;

    tempCtx.drawImage(logoImage, xPos, yPos, imgWidth, imgHeight);

    const data = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);

    for (let y = 0; y < data.height; y += 4) {
        for (let x = 0; x < data.width; x += 4) {
            const i = (y * 4 * data.width) + (x * 4);
            if (data.data[i] > 150) {
                particleArray.push(new Particle(x, y));
            }
        }
    }
}

/* TEXTO COMO ARENA */
function initText() {
    textCanvas.width = canvas.width;
    textCanvas.height = canvas.height;

    textCtx.fillStyle = "white";
    textCtx.font = "14px Arial";
    textCtx.textAlign = "center";

    textCtx.fillText(
        "WORK IN PROGRESS · contacto@mail.com",
        canvas.width / 2,
        canvas.height - 40
    );

    const textData = textCtx.getImageData(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < textData.height; y += 6) {
        for (let x = 0; x < textData.width; x += 6) {
            const i = (y * 4 * textData.width) + (x * 4);
            if (textData.data[i] > 150) {
                particleArray.push(new Particle(x, y, "#888")); // gris arena
            }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particleArray.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initWithLogo();
    initText();
});
</script>

</body>
</html>
