<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAURA GOODSTONE - Work in Progress</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; 
            background-image: url('laura.jpeg'); 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        @media (max-width: 768px) {
            body {
                background-image: url('lauraph.JPG');
            }
        }

        canvas {
            filter: drop-shadow(0 0 10px rgba(210, 180, 140, 0.5));
        }

        /* TEXTO INFERIOR */
        #footerText {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #999;
            font-family: Arial, sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<canvas id="canvas1"></canvas>
<div id="footerText">WORK IN PROGRESS · contacto@mail.com</div>

<script>
const canvas = document.getElementById('canvas1');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particleArray = [];

/* MOUSE COMO VIENTO */
const mouse = { x: null, y: null, vx: 0, vy: 0 };

window.addEventListener('mousemove', (event) => {
    mouse.vx = event.x - mouse.x;
    mouse.vy = event.y - mouse.y;
    mouse.x = event.x;
    mouse.y = event.y;
});

/* TOUCH */
window.addEventListener('touchmove', (event) => {
    const touch = event.touches[0];
    mouse.vx = touch.clientX - mouse.x;
    mouse.vy = touch.clientY - mouse.y;
    mouse.x = touch.clientX;
    mouse.y = touch.clientY;
});

class Particle {
    constructor(x, y, color = null) {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.destX = x;
        this.destY = y;
        this.size = Math.random() * 2 + 0.3;

        const sandColors = ['#e3cba0', '#d2b48c', '#c2a075'];
        this.color = color || sandColors[Math.floor(Math.random() * sandColors.length)];

        this.speed = Math.random() * 0.5 + 0.5;
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }

    update() {
        /* VIENTO (NO CÍRCULO) */
        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 120) {
            this.x += mouse.vx * 0.3;
            this.y += mouse.vy * 0.3;
        }

        /* REGRESO SUAVE */
        this.x += (this.destX - this.x) * 0.03 * this.speed;
        this.y += (this.destY - this.y) * 0.03 * this.speed;
    }
}

/* LOGO */
const logoImage = new Image();
logoImage.src = 'logo.png';

/* TEXTO */
const textCanvas = document.createElement('canvas');
const textCtx = textCanvas.getContext('2d');

logoImage.onload = () => {
    initWithLogo();
    initText();
    animate();
};

function initWithLogo() {
    particleArray = [];

    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');

    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;

    let scale = window.innerWidth < 768 ? 0.4 : 0.7;

    const w = logoImage.width * scale;
    const h = logoImage.height * scale;

    const xPos = (canvas.width - w) / 2;
    const yPos = (canvas.height - h) / 2;

    tempCtx.drawImage(logoImage, xPos, yPos, w, h);

    const data = tempCtx.getImageData(0, 0, canvas.width, canvas.height);

    /* MUCHAS MÁS PARTÍCULAS */
    for (let y = 0; y < data.height; y += 2) {
        for (let x = 0; x < data.width; x += 2) {
            const i = (y * 4 * data.width) + (x * 4);
            if (data.data[i] > 150) {
                particleArray.push(new Particle(x, y));
            }
        }
    }
}

function initText() {
    textCanvas.width = canvas.width;
    textCanvas.height = canvas.height;

    textCtx.fillStyle = "white";
    textCtx.textAlign = "center";

    /* TIPOGRAFÍA MÁS PARECIDA */
    textCtx.font = "600 16px Arial";
    textCtx.letterSpacing = "3px";

    textCtx.fillText(
        "WORK IN PROGRESS",
        canvas.width / 2,
        canvas.height - 60
    );

    textCtx.font = "14px Arial";

    textCtx.fillText(
        "contacto@mail.com",
        canvas.width / 2,
        canvas.height - 35
    );

    const data = textCtx.getImageData(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < data.height; y += 3) {
        for (let x = 0; x < data.width; x += 3) {
            const i = (y * 4 * data.width) + (x * 4);
            if (data.data[i] > 150) {
                particleArray.push(new Particle(x, y, "#9a9a9a"));
            }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particleArray.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initWithLogo();
    initText();
});
</script>

</body>
</html>
