<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAURA GOODSTONE - Work in Progress</title>

<style>
body {
    margin: 0;
    padding: 0;
    background-color: #1a1a1a;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;

    height: 100vh;
    height: 100svh; /* FIX móvil moderno */
    position: relative;
}

/* BACKGROUND */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                url('laura.jpeg');
    background-size: cover;
    background-position: center;
    z-index: 0;
}

@media (max-width: 768px) {
    body::before {
        background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                    url('lauraph.JPG');
        background-size: cover;
        background-position: center;
    }
}

/* CANVAS */
canvas {
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 10px rgba(210, 180, 140, 0.5));
}

/* FOOTER FIXED (SIEMPRE VISIBLE) */
.footer {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
    z-index: 10;
    font-family: Arial, sans-serif;
    color: #aaa;
    letter-spacing: 2px;
    pointer-events: none;
}

.footer a {
    color: #aaa;
    text-decoration: none;
    word-break: break-word;
    pointer-events: auto;
}

/* MOBILE SMALL FIX */
@media (max-width: 768px) {
    .footer {
        font-size: 12px;
        bottom: 15px;
        padding: 0 10px;
    }
}
</style>
</head>

<body>

<canvas id="canvas1"></canvas>

<div class="footer">
    <div>WORK IN PROGRESS</div>
    <div>
        <a href="mailto:lauragoodstone01@gmail.com">
            lauragoodstone01@gmail.com
        </a>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas1');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();

let particleArray = [];

const mouse = {
    x: null,
    y: null,
    radius: 150,
    active: false
};

let lastMoveTime = 0;
const ACTIVITY_TIMEOUT = 120;

function activateMouse(x, y) {
    mouse.x = x;
    mouse.y = y;
    mouse.active = true;
    lastMoveTime = Date.now();
}

/* MOUSE */
window.addEventListener('mousemove', (e) => {
    activateMouse(e.x, e.y);
});

/* TOUCH */
window.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    activateMouse(t.clientX, t.clientY);
});

window.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    activateMouse(t.clientX, t.clientY);
});

class Particle {
    constructor(x, y) {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.destX = x;
        this.destY = y;
        this.size = Math.random() * 3 + 1;

        const sandColors = ['#e3cba0', '#d2b48c', '#c2a075'];
        this.color = sandColors[Math.floor(Math.random() * sandColors.length)];

        this.reactToMouse = Math.random() < 0.5; // 50% partículas
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }

    update() {

        if (Date.now() - lastMoveTime > ACTIVITY_TIMEOUT) {
            mouse.active = false;
        }

        if (mouse.active && this.reactToMouse) {

            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            let force = (mouse.radius - distance) / mouse.radius;

            if (distance < mouse.radius) {
                this.x -= dx * force * 0.2;
                this.y -= dy * force * 0.2;
                return;
            }
        }

        this.x += (this.destX - this.x) / 50;
        this.y += (this.destY - this.y) / 50;
    }
}

/* LOGO */
const logoImage = new Image();
logoImage.src = 'logo.png';

logoImage.onload = () => {
    initWithLogo();
    animate();
};

function initWithLogo() {
    particleArray = [];

    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');

    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;

    let scale = 0.6;

if (window.innerWidth < 768) {
    scale = 0.25; // 👈 aquí controlas el tamaño en móvil
}

    const w = logoImage.width * scale;
    const h = logoImage.height * scale;

    const xPos = (canvas.width - w) / 2;
    const yPos = (canvas.height - h) / 2;

    tempCtx.drawImage(logoImage, xPos, yPos, w, h);

    const data = tempCtx.getImageData(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < data.height; y += 4) {
        for (let x = 0; x < data.width; x += 4) {
            const i = (y * 4 * data.width) + (x * 4);

            if (data.data[i] > 150) {
                particleArray.push(new Particle(x, y));
            }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particleArray.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', resizeCanvas);
</script>

</body>
</html>
