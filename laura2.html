<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAURA GOODSTONE - Work in Progress</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; 
            background-image: url('laura.jpeg'); /* Tu fondo de PC */
            background-size: cover;
            background-position: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }

        @media (max-width: 768px) {
            body { background-image: url('lauraph.jpeg'); } /* Tu fondo de móvil */
        }

        canvas {
            filter: drop-shadow(0 0 10px rgba(210, 180, 140, 0.4));
            z-index: 1;
        }

        /* Contenedor de contacto */
        #contact-info {
            position: absolute;
            bottom: 40px;
            text-align: center;
            z-index: 2;
            letter-spacing: 3px;
        }

        #contact-info a {
            display: block;
            color: #8c785d; /* Color más oscuro/sepia para separar visualmente */
            text-decoration: none;
            margin: 10px 0;
            font-size: 14px;
            transition: color 0.3s ease;
            text-transform: uppercase;
        }

        #contact-info a:hover {
            color: #d2b48c; /* Brilla al pasar el ratón */
        }
    </style>
</head>
<body>

    <canvas id="canvas1"></canvas>

    <div id="contact-info">
        <a href="mailto:info@lauragoodstone.com">info@lauragoodstone.com</a>
        <a href="tel:+34600000000">+34 600 000 000</a>
    </div>

    <script>
        // ==========================================
        // PANEL DE VARIABLES (Configura aquí tu arena)
        // ==========================================
        const CONFIG = {
            logoPath: 'logo.png',            // Ruta de tu archivo de logo
            logoScale: 0.5,                  // Tamaño del logo (0.1 a 1.0)
            particleResolution: 4,           // Resolución: 1 es máxima (pesado), 4-6 es ideal
            particleSizeMin: 1,              // Tamaño mínimo de grano de arena
            particleSizeMax: 3,              // Tamaño máximo de grano de arena
            mouseRadius: 150,                // Radio de explosión al pasar el ratón
            returnSpeed: 0.02,               // Velocidad de retorno (0.01 lento, 0.1 rápido)
            scatterForce: 30,                // Fuerza de dispersión
            colors: ['#e3cba0', '#d2b48c', '#af9471', '#5e4f3a'], // Paleta de la arena
            shadowColor: 'rgba(210, 180, 140, 0.5)' // Color del resplandor
        };

        const canvas = document.getElementById('canvas1');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particleArray = [];
        const mouse = { x: null, y: null, radius: CONFIG.mouseRadius };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        class Particle {
            constructor(x, y) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.destX = x;
                this.destY = y;
                this.size = Math.random() * (CONFIG.particleSizeMax - CONFIG.particleSizeMin) + CONFIG.particleSizeMin;
                this.color = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
                this.density = (Math.random() * CONFIG.scatterForce) + 1;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < mouse.radius) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    this.x -= (dx / distance) * force * this.density;
                    this.y -= (dy / distance) * force * this.density;
                } else {
                    // Retorno suave a la posición original
                    if (this.x !== this.destX) {
                        this.x -= (this.x - this.destX) * CONFIG.returnSpeed;
                    }
                    if (this.y !== this.destY) {
                        this.y -= (this.y - this.destY) * CONFIG.returnSpeed;
                    }
                }
            }
        }

        const logoImage = new Image();
        logoImage.src = CONFIG.logoPath;
        
        logoImage.onload = () => {
            init();
            animate();
        };

        function init() {
            particleArray = [];
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;

            const w = logoImage.width * CONFIG.logoScale;
            const h = logoImage.height * CONFIG.logoScale;
            const x = (canvas.width - w) / 2;
            const y = (canvas.height - h) / 2;

            tempCtx.drawImage(logoImage, x, y, w, h);
            const data = tempCtx.getImageData(0, 0, canvas.width, canvas.height);

            // Escaneo de píxeles según la resolución configurada
            for (let y = 0; y < data.height; y += CONFIG.particleResolution) {
                for (let x = 0; x < data.width; x += CONFIG.particleResolution) {
                    // Si el píxel es lo suficientemente brillante (blanco del logo)
                    if (data.data[(y * 4 * data.width) + (x * 4) + 3] > 128) {
                        particleArray.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particleArray.length; i++) {
                particleArray[i].update();
                particleArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });
    </script>
</body>
</html>
