<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAURA GOODSTONE - Work in Progress</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('laura.jpeg');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        /* MOBILE FIX */
        @media (max-width: 768px) {
            body {
                overflow: hidden;
            }

            body::before {
                background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                            url('lauraph.JPG');
                background-size: contain; /* <-- muestra imagen completa */
                background-repeat: no-repeat;
                background-position: center;
            }

            .footer {
                bottom: 15px;
                font-size: 12px;
                padding: 0 10px;
            }
        }

        canvas {
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 10px rgba(210, 180, 140, 0.5));
        }

        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            z-index: 2;
            font-family: Arial, sans-serif;
            color: #aaa;
            letter-spacing: 2px;
        }

        .footer a {
            color: #aaa;
            text-decoration: none;
            word-break: break-word; /* <-- evita que el mail se corte */
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<canvas id="canvas1"></canvas>

<div class="footer">
    <div>WORK IN PROGRESS</div>
    <div>
        <a href="mailto:lauragoodstone01@gmail.com">
            lauragoodstone01@gmail.com
        </a>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas1');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particleArray = [];

const mouse = { x: null, y: null, radius: 150 };

window.addEventListener('mousemove', (event) => {
    mouse.x = event.x;
    mouse.y = event.y;
});

window.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    mouse.x = t.clientX;
    mouse.y = t.clientY;
});

window.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    mouse.x += (t.clientX - mouse.x) * 0.3;
    mouse.y += (t.clientY - mouse.y) * 0.3;
});

class Particle {
    constructor(x, y) {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.destX = x;
        this.destY = y;
        this.size = Math.random() * 3 + 1;

        const sandColors = ['#e3cba0', '#d2b48c', '#c2a075'];
        this.color = sandColors[Math.floor(Math.random() * sandColors.length)];

        this.density = (Math.random() * 30) + 1;
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }

    update() {
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let distance = Math.sqrt(dx * dx + dy * dy);

        let force = (mouse.radius - distance) / mouse.radius;

        if (distance < mouse.radius) {
            /* REDUCCIÓN A ~50% */
            this.x -= dx * force * 0.1;
            this.y -= dy * force * 0.1;
        } else {
            this.x += (this.destX - this.x) / 50;
            this.y += (this.destY - this.y) / 50;
        }
    }
}

const logoImage = new Image();
logoImage.src = 'logo.png';

logoImage.onload = () => {
    initWithLogo();
    animate();
};

function initWithLogo() {
    particleArray = [];

    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');

    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;

    /* ESCALA RESPONSIVE */
    let scale = 0.6;
    if (window.innerWidth < 768) {
        scale = 0.35; /* <-- logo más chico en móvil */
    }

    const w = logoImage.width * scale;
    const h = logoImage.height * scale;

    const xPos = (canvas.width - w) / 2;
    const yPos = (canvas.height - h) / 2;

    tempCtx.drawImage(logoImage, xPos, yPos, w, h);

    const data = tempCtx.getImageData(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < data.height; y += 4) {
        for (let x = 0; x < data.width; x += 4) {
            const i = (y * 4 * data.width) + (x * 4);

            if (data.data[i] > 150) {
                particleArray.push(new Particle(x, y));
            }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particleArray.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initWithLogo();
});
</script>

</body>
</html>
