<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAURA GOODSTONE - Work in Progress</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        /* FONDO OSCURECIDO (DESKTOP) */
        body::before {
            content: "";
            position: absolute;
            inset: 0;

            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('laura.jpeg');

            background-size: cover;
            background-position: center;

            z-index: 0;
        }

        /* FONDO OSCURECIDO (MÓVIL) */
        @media (max-width: 768px) {
            body::before {
                background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                            url('lauraph.JPG');
                background-size: cover;
                background-position: center;
            }
        }

        canvas {
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 10px rgba(210, 180, 140, 0.5));
        }
    </style>
</head>
<body>

    <canvas id="canvas1"></canvas>

    <script>
        const canvas = document.getElementById('canvas1');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particleArray = [];
        const mouse = { x: null, y: null, radius: 150 }; 

        window.addEventListener('mousemove', (event) => {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        class Particle {
            constructor(x, y) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.destX = x;
                this.destY = y;
                this.size = Math.random() * 3 + 1; 
                this.baseX = this.x;
                this.baseY = this.y;

                const sandColors = ['#e3cba0', '#d2b48c', '#c2a075'];
                this.color = sandColors[Math.floor(Math.random() * sandColors.length)];

                this.density = (Math.random() * 30) + 1;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.destX) {
                        let dxBack = this.x - this.destX;
                        this.x -= dxBack / 50;
                    }
                    if (this.y !== this.destY) {
                        let dyBack = this.y - this.destY;
                        this.y -= dyBack / 50;
                    }
                }
            }
        }

        const logoImage = new Image();
        logoImage.src = 'logo.png'; 
        
        logoImage.onload = () => {
            initWithLogo();
            animate();
        };

        function initWithLogo() {
            particleArray = [];
            
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;

            const scale = 0.6;
            const imgWidth = logoImage.width * scale;
            const imgHeight = logoImage.height * scale;
            const xPos = (tempCanvas.width - imgWidth) / 2;
            const yPos = (tempCanvas.height - imgHeight) / 2;

            tempCtx.drawImage(logoImage, xPos, yPos, imgWidth, imgHeight);

            const textCoordinates = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            
            for (let y = 0, y2 = textCoordinates.height; y < y2; y += 4) {
                for (let x = 0, x2 = textCoordinates.width; x < x2; x += 4) {
                    const pixelIndex = (y * 4 * textCoordinates.width) + (x * 4);
                    const r = textCoordinates.data[pixelIndex];
                    const g = textCoordinates.data[pixelIndex + 1];
                    const b = textCoordinates.data[pixelIndex + 2];
                    const a = textCoordinates.data[pixelIndex + 3];

                    if (r > 150 && g > 150 && b > 150 && a > 128) { 
                        particleArray.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particleArray.length; i++) {
                particleArray[i].update();
                particleArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initWithLogo(); 
        });
    </script>

</body>
</html>
