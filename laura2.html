<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAURA GOODSTONE - Work in Progress</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('laura.jpeg');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        @media (max-width: 768px) {
            body::before {
                background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                            url('lauraph.JPG');
                background-size: cover;
                background-position: center;
            }
        }

        canvas {
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 10px rgba(210, 180, 140, 0.5));
        }

        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            z-index: 2;
            font-family: Arial, sans-serif;
            color: #aaa;
            letter-spacing: 2px;
        }

        .footer a {
            color: #aaa;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<canvas id="canvas1"></canvas>

<div class="footer">
    <div>WORK IN PROGRESS</div>
    <div>
        <a href="mailto:lauragoodstone01@gmail.com">
            lauragoodstone01@gmail.com
        </a>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas1');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particleArray = [];

/* MOUSE / TOUCH COMO VIENTO */
const mouse = {
    x: null,
    y: null,
    vx: 0,
    vy: 0
};

/* DESKTOP */
window.addEventListener('mousemove', (e) => {
    mouse.vx = e.clientX - mouse.x;
    mouse.vy = e.clientY - mouse.y;
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

/* TOUCH */
window.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    mouse.x = t.clientX;
    mouse.y = t.clientY;
});

window.addEventListener('touchmove', (e) => {
    const t = e.touches[0];

    const dx = t.clientX - mouse.x;
    const dy = t.clientY - mouse.y;

    mouse.vx = dx * 0.6;
    mouse.vy = dy * 0.6;

    mouse.x = t.clientX;
    mouse.y = t.clientY;
});

/* PARTÍCULAS */
class Particle {
    constructor(x, y) {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;

        this.destX = x;
        this.destY = y;

        this.size = Math.random() * 2 + 0.5;

        const sandColors = ['#e3cba0', '#d2b48c', '#c2a075'];
        this.color = sandColors[Math.floor(Math.random() * sandColors.length)];

        this.vx = 0;
        this.vy = 0;
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }

    update() {
        /* FUERZA DE VIENTO */
        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 120) {
            this.vx += mouse.vx * 0.02;
            this.vy += mouse.vy * 0.02;
        }

        /* FRICCIÓN (arena pierde energía) */
        this.vx *= 0.92;
        this.vy *= 0.92;

        /* REGRESO SUAVE */
        this.vx += (this.destX - this.x) * 0.002;
        this.vy += (this.destY - this.y) * 0.002;

        this.x += this.vx;
        this.y += this.vy;
    }
}

/* LOGO */
const logoImage = new Image();
logoImage.src = 'logo.png';

logoImage.onload = () => {
    initWithLogo();
    animate();
};

function initWithLogo() {
    particleArray = [];

    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');

    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;

    const scale = window.innerWidth < 768 ? 0.45 : 0.6;

    const w = logoImage.width * scale;
    const h = logoImage.height * scale;

    const x = (canvas.width - w) / 2;
    const y = (canvas.height - h) / 2;

    tempCtx.drawImage(logoImage, x, y, w, h);

    const data = tempCtx.getImageData(0, 0, canvas.width, canvas.height);

    for (let yPos = 0; yPos < data.height; yPos += 3) {
        for (let xPos = 0; xPos < data.width; xPos += 3) {
            const i = (yPos * 4 * data.width) + (xPos * 4);

            if (data.data[i] > 150) {
                particleArray.push(new Particle(xPos, yPos));
            }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particleArray.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initWithLogo();
});
</script>

</body>
</html>
