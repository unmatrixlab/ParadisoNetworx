<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAURA GOODSTONE - Work in Progress</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            background-image: url('laura.jpeg');
            background-size: cover;
            background-position: center;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        @media (max-width: 768px) {
            body {
                background-image: url('lauraph.jpg');
            }
        }

        canvas {
            filter: drop-shadow(0 0 10px rgba(210, 180, 140, 0.5));
        }

        #ui {
            position: absolute;
            bottom: 20px;
            color: #d2b48c;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <canvas id="canvas1"></canvas>
    <div id="ui">Work in Progress</div>

    <script>
        const canvas = document.getElementById('canvas1');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particleArray = [];
        const mouse = { x: null, y: null, radius: 100 };

        window.addEventListener('mousemove', (event) => {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        class Particle {
            constructor(x, y) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.destX = x;
                this.destY = y;
                this.size = Math.random() * 2 + 0.5; // Partículas un poco más finas para el logo
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
                this.color = '#d2b48c'; 
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.destX) {
                        let dx = this.x - this.destX;
                        this.x -= dx / 15; // Un poco más rápido el retorno
                    }
                    if (this.y !== this.destY) {
                        let dy = this.y - this.destY;
                        this.y -= dy / 15;
                    }
                }
            }
        }

        const logoImage = new Image();
        logoImage.src = 'logo.png'; // Asegúrate de que el nombre coincida

        function init() {
            particleArray = [];
            
            // Calculamos dimensiones para centrar el logo
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            
            // Ajustamos el tamaño del logo según la pantalla
            const scale = window.innerWidth < 768 ? 0.6 : 0.8;
            const logow = logoImage.width * scale;
            const logoh = logoImage.height * scale;
            
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            
            // Dibujamos el logo centrado en el canvas temporal
            tempCtx.drawImage(
                logoImage, 
                (canvas.width - logow) / 2, 
                (canvas.height - logoh) / 2, 
                logow, 
                logoh
            );

            const textCoordinates = tempCtx.getImageData(0, 0, canvas.width, canvas.height);
            
            // Recorremos los píxeles (cada 3 o 4 para no sobrecargar de partículas)
            for (let y = 0; y < textCoordinates.height; y += 3) {
                for (let x = 0; x < textCoordinates.width; x += 3) {
                    // Si el pixel no es transparente (alpha > 128)
                    if (textCoordinates.data[(y * 4 * textCoordinates.width) + (x * 4) + 3] > 128) {
                        particleArray.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particleArray.length; i++) {
                particleArray[i].update();
                particleArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        // Importante: Esperar a que la imagen cargue antes de iniciar
        logoImage.onload = () => {
            init();
            animate();
        };

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });
    </script>
</body>
</html>
