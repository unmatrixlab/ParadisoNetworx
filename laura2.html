<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAURA GOODSTONE - Work in Progress</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Fondo oscuro para que la arena clara resalte */
            background-color: #1a1a1a; 
            /* REEMPLAZA CON TU IMAGEN DE FONDO REAL */
            background-image: url('laura_bg.jpg'); 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Estilos para móvil */
        @media (max-width: 768px) {
            body {
                /* REEMPLAZA CON TU IMAGEN DE FONDO PARA MÓVIL REAL */
                background-image: url('lauraph.jpeg');
            }
        }

        canvas {
            filter: drop-shadow(0 0 10px rgba(210, 180, 140, 0.5));
        }

        /* Eliminado el estilo #ui, el logo entero es de partículas */
    </style>
</head>
<body>

    <canvas id="canvas1"></canvas>
    <script>
        const canvas = document.getElementById('canvas1');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particleArray = [];
        // Mejorado: Radio del ratón aumentado para mayor interacción
        const mouse = { x: null, y: null, radius: 150 }; 

        window.addEventListener('mousemove', (event) => {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        class Particle {
            constructor(x, y) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.destX = x;
                this.destY = y;
                // Mejorado: Rango de tamaño mayor para textura
                this.size = Math.random() * 3 + 1; 
                this.baseX = this.x;
                this.baseY = this.y;
                // Mejorado: Paleta de colores arena variada
                const sandColors = ['#e3cba0', '#d2b48c', '#c2a075'];
                this.color = sandColors[Math.floor(Math.random() * sandColors.length)];
                this.density = (Math.random() * 30) + 1;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    // Mejorado: Retorno más lento para un efecto de "flotación"
                    if (this.x !== this.destX) {
                        let dxBack = this.x - this.destX;
                        this.x -= dxBack / 50; // Retorno más lento (era /20)
                    }
                    if (this.y !== this.destY) {
                        let dyBack = this.y - this.destY;
                        this.y -= dyBack / 50;
                    }
                }
            }
        }

        // Carga la imagen del logo. El logo proporcionado tiene fondo negro.
        // El script buscará los píxeles blancos.
        const logoImage = new Image();
        // REEMPLAZA CON LA RUTA DE TU IMAGEN DE LOGO REAL
        logoImage.src = 'tu_logo.png'; 
        
        // Manejamos la carga asíncrona de la imagen
        logoImage.onload = () => {
            initWithLogo();
            animate();
        };

        function initWithLogo() {
            particleArray = [];
            
            // Creamos un canvas temporal y oculto para procesar la imagen
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;

            // Centramos y escalamos la imagen en el canvas temporal
            const scale = 0.6; // Ajusta este factor para cambiar el tamaño del logo en pantalla
            const imgWidth = logoImage.width * scale;
            const imgHeight = logoImage.height * scale;
            const xPos = (tempCanvas.width - imgWidth) / 2;
            const yPos = (tempCanvas.height - imgHeight) / 2;

            tempCtx.drawImage(logoImage, xPos, yPos, imgWidth, imgHeight);

            // Capturamos los datos de los píxeles del logo dibujado
            const textCoordinates = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            
            // Procesamos cada 4 píxeles para velocidad
            for (let y = 0, y2 = textCoordinates.height; y < y2; y += 4) {
                for (let x = 0, x2 = textCoordinates.width; x < x2; x += 4) {
                    const pixelIndex = (y * 4 * textCoordinates.width) + (x * 4);
                    const r = textCoordinates.data[pixelIndex];
                    const g = textCoordinates.data[pixelIndex + 1];
                    const b = textCoordinates.data[pixelIndex + 2];
                    const a = textCoordinates.data[pixelIndex + 3];

                    // Detectamos los píxeles blancos del logo original (blanco sobre negro)
                    // Buscamos brillo alto en R, G, y B.
                    if (r > 150 && g > 150 && b > 150 && a > 128) { 
                        particleArray.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particleArray.length; i++) {
                particleArray[i].update();
                particleArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        // Eliminados los init() y animate() originales del final.
        // Ahora se ejecutan en el logoImage.onload.

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Volvemos a inicializar para re-centrar el logo
            initWithLogo(); 
        });
    </script>
</body>
</html>
