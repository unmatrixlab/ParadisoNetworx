<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Laura Goodstone | Official Website</title>
  <meta name="description" content="Laura Goodstone is an independent artist blending country, rock, blues and soul into emotionally driven original music rooted in storytelling." />

  <!-- ==================================================
       DEVICE ROUTER
       This file sends each visitor to the best version:
       phone.html   = 680px and below
       tablet.html  = 681px to 1024px
       desktop.html = 1025px and above
  ================================================== -->

  <style>
    :root {
      --bg-dark: #050505;
      --paper: #efe4cc;
      --accent: #d7b56d;
      --text-soft: rgba(247, 241, 230, 0.78);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(215, 181, 109, 0.12), transparent 34%),
        linear-gradient(180deg, #14100a 0%, #050505 100%);
      color: var(--paper);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      overflow: hidden;
    }

    .loader {
      width: min(620px, 100%);
      text-align: center;
      padding: 34px 28px;
      border-radius: 28px;
      border: 1px solid rgba(215, 181, 109, 0.24);
      background:
        linear-gradient(135deg, rgba(18, 12, 7, 0.82), rgba(18, 12, 7, 0.38));
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.54);
      backdrop-filter: blur(12px);
    }

    .loader h1 {
      font-size: clamp(2rem, 8vw, 4rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .loader p {
      color: var(--text-soft);
      font-size: 1.15rem;
      line-height: 1.55;
      margin-bottom: 24px;
    }

    .manual-links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .manual-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid rgba(215, 181, 109, 0.36);
      color: var(--paper);
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: rgba(0, 0, 0, 0.24);
      transition: 0.24s ease;
    }

    .manual-links a:hover {
      background: var(--accent);
      color: #20150a;
      border-color: var(--accent);
      transform: translateY(-2px);
    }
  </style>

  <script>
    (function () {
      const PHONE_MAX = 680;
      const TABLET_MAX = 1024;

      function getTargetFile() {
        const width = window.innerWidth || document.documentElement.clientWidth || screen.width;

        if (width <= PHONE_MAX) {
          return "phone.html";
        }

        if (width <= TABLET_MAX) {
          return "tablet.html";
        }

        return "desktop.html";
      }

      function redirectToDeviceVersion() {
        const target = getTargetFile();

        /*
          location.replace avoids creating an unnecessary browser history entry.
          The user can still return to the previous external page normally.
        */
        window.location.replace(target);
      }

      redirectToDeviceVersion();
    })();
  </script>
</head>

<body>
  <main class="loader">
    <h1>Laura Goodstone</h1>
    <p>
      Loading the best version for your device.
      If nothing happens, choose your version manually.
    </p>

    <nav class="manual-links" aria-label="Manual version selector">
      <a href="desktop.html">Desktop</a>
      <a href="tablet.html">Tablet</a>
      <a href="phone.html">Phone</a>
    </nav>
  </main>
</body>
</html>
