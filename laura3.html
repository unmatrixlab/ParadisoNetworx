<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laura Goodstone | Work in Progress</title>

  <style>
    :root {
      --bg-desktop: url("https://paradisonetworx.com/laura.jpeg");
      --bg-mobile: url("https://paradisonetworx.com/lauraph.JPG");
      --logo-url: url("https://paradisonetworx.com/logo.png");

      --logo-width-desktop: min(760px, 72vw);
      --logo-width-mobile: min(92vw, 520px);

      --logo-y-desktop: -2vh;
      --logo-y-mobile: -4vh;

      --footer-y-desktop: 7vh;
      --footer-y-mobile: 4vh;

      --background-darkness: 0.66;
      --background-blur: 1px;

      --sand-light: #e9cf90;
      --sand-mid: #c69b52;
      --sand-dark: #7b5529;
      --sand-glow: rgba(255, 210, 135, 0.38);

      --text-color: #f5ead2;
      --text-soft: rgba(245, 234, 210, 0.72);

      --transition-slow: 1400ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050403;
      color: var(--text-color);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      min-height: 100vh;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100svh;
      overflow: hidden;
      isolation: isolate;
      background: #050403;
    }

    .background {
      position: absolute;
      inset: 0;
      background-image: var(--bg-desktop);
      background-size: cover;
      background-position: center;
      filter: blur(var(--background-blur)) saturate(0.92) contrast(1.08);
      transform: scale(1.035);
      opacity: 0;
      animation: bgReveal 2200ms ease forwards;
      z-index: 0;
    }

    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 40%, rgba(255, 220, 150, 0.10), transparent 34%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.7)),
        rgba(0, 0, 0, var(--background-darkness));
      z-index: 1;
    }

    .vignette {
      position: absolute;
      inset: -10%;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 0 34%, rgba(0, 0, 0, 0.32) 62%, rgba(0, 0, 0, 0.82) 100%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.28), transparent 32%, rgba(0, 0, 0, 0.58));
      z-index: 2;
    }

    .dust-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.52;
      background-image:
        radial-gradient(circle, rgba(232, 203, 142, 0.16) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255, 245, 210, 0.10) 0 1px, transparent 1.5px);
      background-size: 140px 140px, 210px 210px;
      background-position: 0 0, 80px 40px;
      animation: floatingDust 24s linear infinite;
      z-index: 3;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo-wrap {
      position: relative;
      width: var(--logo-width-desktop);
      aspect-ratio: 16 / 9;
      transform: translateY(var(--logo-y-desktop));
      opacity: 0;
      animation: logoStageIn 1200ms ease 1100ms forwards;
      touch-action: none;
    }

    .logo-shadow {
      position: absolute;
      inset: -8%;
      background: radial-gradient(circle at center, rgba(0, 0, 0, 0.72), transparent 68%);
      filter: blur(18px);
      opacity: 0.88;
      z-index: 0;
    }

    .sand-logo {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(circle at 14% 22%, rgba(255, 244, 198, 0.84) 0 1px, transparent 1.8px),
        radial-gradient(circle at 68% 31%, rgba(255, 224, 147, 0.72) 0 1px, transparent 2px),
        radial-gradient(circle at 42% 74%, rgba(127, 84, 39, 0.45) 0 1px, transparent 2px),
        linear-gradient(125deg, #f7df9b 0%, #c89746 34%, #805329 68%, #f0c772 100%);
      background-size: 17px 17px, 23px 23px, 31px 31px, 100% 100%;
      -webkit-mask-image: var(--logo-url);
      mask-image: var(--logo-url);
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
      -webkit-mask-size: contain;
      mask-size: contain;
      clip-path: inset(100% 0 0 0);
      filter:
        drop-shadow(0 0 14px rgba(224, 174, 91, 0.28))
        drop-shadow(0 18px 32px rgba(0, 0, 0, 0.82));
      animation:
        sandFill 4600ms cubic-bezier(0.17, 0.84, 0.29, 1) 1750ms forwards,
        sandTextureMove 8s linear infinite;
    }

    .sand-logo::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(110deg, transparent 0%, rgba(255, 248, 215, 0.0) 34%, rgba(255, 248, 215, 0.42) 48%, rgba(255, 248, 215, 0.0) 62%, transparent 100%);
      transform: translateX(-130%);
      animation: finalShimmer 2200ms ease 6500ms forwards;
      mix-blend-mode: screen;
    }

    .sand-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
      -webkit-mask-image: var(--logo-url);
      mask-image: var(--logo-url);
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
      -webkit-mask-size: contain;
      mask-size: contain;
      filter: drop-shadow(0 0 10px rgba(255, 198, 93, 0.35));
    }

    .falling-canvas {
      position: absolute;
      inset: -18% -4% -6% -4%;
      width: 108%;
      height: 124%;
      z-index: 4;
      pointer-events: none;
    }

    .top-sand-line {
      position: absolute;
      top: -2%;
      left: 8%;
      width: 84%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(240, 202, 125, 0.78), transparent);
      box-shadow: 0 0 22px rgba(247, 206, 127, 0.48);
      opacity: 0;
      animation: sandLineIn 900ms ease 1550ms forwards, sandLineOut 1100ms ease 5200ms forwards;
      z-index: 5;
    }

    .footer {
      position: relative;
      z-index: 8;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 13px;
      transform: translateY(var(--footer-y-desktop));
      opacity: 0;
      animation: footerIn 1200ms ease 6100ms forwards;
      text-align: center;
    }

    .work {
      margin: 0;
      font-size: clamp(1.2rem, 2.3vw, 2.15rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 400;
      color: var(--text-color);
      text-shadow:
        0 2px 8px rgba(0, 0, 0, 0.9),
        0 0 22px rgba(232, 193, 118, 0.18);
    }

    .email-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-soft);
      text-decoration: none;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(0.86rem, 1.15vw, 1rem);
      letter-spacing: 0.04em;
      padding: 10px 16px;
      border: 1px solid rgba(230, 196, 128, 0.24);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(8px);
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      transition: transform 260ms ease, color 260ms ease, border-color 260ms ease, background 260ms ease;
    }

    .email-link:hover {
      transform: translateY(-2px);
      color: #ffe5aa;
      border-color: rgba(240, 201, 126, 0.58);
      background: rgba(38, 24, 10, 0.42);
    }

    .email-link svg {
      width: 19px;
      height: 19px;
      flex: 0 0 auto;
    }

    .audio-control {
      position: absolute;
      right: 22px;
      bottom: 22px;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-width: 46px;
      height: 46px;
      padding: 0 14px;
      border: 1px solid rgba(230, 196, 128, 0.25);
      border-radius: 999px;
      color: rgba(255, 238, 197, 0.88);
      background: rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(10px);
      cursor: pointer;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      letter-spacing: 0.04em;
      opacity: 0;
      animation: footerIn 1000ms ease 6800ms forwards;
      transition: transform 240ms ease, border-color 240ms ease, background 240ms ease;
    }

    .audio-control:hover {
      transform: translateY(-2px);
      border-color: rgba(240, 201, 126, 0.58);
      background: rgba(38, 24, 10, 0.44);
    }

    .audio-control svg {
      width: 18px;
      height: 18px;
    }

    @keyframes bgReveal {
      from {
        opacity: 0;
        transform: scale(1.08);
      }
      to {
        opacity: 1;
        transform: scale(1.035);
      }
    }

    @keyframes floatingDust {
      from {
        transform: translate3d(0, 0, 0);
      }
      to {
        transform: translate3d(-120px, 80px, 0);
      }
    }

    @keyframes logoStageIn {
      from {
        opacity: 0;
        transform: translateY(calc(var(--logo-y-desktop) + 16px)) scale(0.97);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: translateY(var(--logo-y-desktop)) scale(1);
        filter: blur(0);
      }
    }

    @keyframes sandFill {
      0% {
        clip-path: inset(100% 0 0 0);
        opacity: 0.2;
      }
      14% {
        opacity: 1;
      }
      100% {
        clip-path: inset(0 0 0 0);
        opacity: 1;
      }
    }

    @keyframes sandTextureMove {
      from {
        background-position: 0 0, 0 0, 0 0, center;
      }
      to {
        background-position: 80px 130px, -100px 90px, 60px -120px, center;
      }
    }

    @keyframes finalShimmer {
      from {
        transform: translateX(-130%);
      }
      to {
        transform: translateX(130%);
      }
    }

    @keyframes sandLineIn {
      from {
        opacity: 0;
        transform: scaleX(0.25);
      }
      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @keyframes sandLineOut {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
      }
    }

    @keyframes footerIn {
      from {
        opacity: 0;
        filter: blur(8px);
        transform: translateY(calc(var(--footer-y-desktop) + 14px));
      }
      to {
        opacity: 1;
        filter: blur(0);
        transform: translateY(var(--footer-y-desktop));
      }
    }

    @media (max-width: 760px) {
      .background {
        background-image: var(--bg-mobile);
        background-position: center top;
      }

      .logo-wrap {
        width: var(--logo-width-mobile);
        transform: translateY(var(--logo-y-mobile));
      }

      .footer {
        transform: translateY(var(--footer-y-mobile));
        gap: 11px;
      }

      .work {
        font-size: clamp(1rem, 5.4vw, 1.5rem);
        letter-spacing: 0.13em;
      }

      .email-link {
        font-size: 0.82rem;
        padding: 9px 13px;
        max-width: 92vw;
      }

      .audio-control {
        right: 14px;
        bottom: 14px;
        height: 42px;
        padding: 0 12px;
      }

      @keyframes logoStageIn {
        from {
          opacity: 0;
          transform: translateY(calc(var(--logo-y-mobile) + 16px)) scale(0.97);
          filter: blur(8px);
        }
        to {
          opacity: 1;
          transform: translateY(var(--logo-y-mobile)) scale(1);
          filter: blur(0);
        }
      }

      @keyframes footerIn {
        from {
          opacity: 0;
          filter: blur(8px);
          transform: translateY(calc(var(--footer-y-mobile) + 14px));
        }
        to {
          opacity: 1;
          filter: blur(0);
          transform: translateY(var(--footer-y-mobile));
        }
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }

      .sand-logo {
        clip-path: inset(0 0 0 0);
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="background"></div>
    <div class="vignette"></div>
    <div class="dust-layer"></div>

    <section class="stage" aria-label="Laura Goodstone Work in Progress">
      <div class="logo-wrap" id="logoWrap">
        <div class="logo-shadow"></div>
        <div class="top-sand-line"></div>
        <div class="sand-logo" aria-hidden="true"></div>
        <canvas class="sand-canvas" id="sandCanvas"></canvas>
        <canvas class="falling-canvas" id="fallingCanvas"></canvas>
      </div>

      <footer class="footer">
        <h1 class="work">Work in Progress</h1>

        <a class="email-link" href="mailto:lauragoodstone01@gmail.com" aria-label="Email Laura Goodstone">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 6.5h16v11H4v-11Z" stroke="currentColor" stroke-width="1.6" />
            <path d="m4.8 7.3 7.2 5.4 7.2-5.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span>lauragoodstone01@gmail.com</span>
        </a>
      </footer>
    </section>

    <button class="audio-control" id="audioBtn" type="button" aria-label="Play background music">
      <svg id="audioIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 9.5v5h3.5L13 18V6L8.5 9.5H5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
        <path d="M16 9c.8.8 1.2 1.8 1.2 3s-.4 2.2-1.2 3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
      </svg>
      <span id="audioText">Music</span>
    </button>

    <audio id="bgMusic" preload="none" loop>
      <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg" />
    </audio>
  </main>

  <script>
    const CONFIG = {
      musicVolume: 0.18,

      sand: {
        fallDurationMs: 6200,
        totalFallingParticles: 260,
        totalSettledParticles: 1350,
        desktopParticleScale: 1,
        mobileParticleScale: 0.72
      },

      interaction: {
        radius: 130,
        strength: 1.2,
        durationMs: 900
      }
    };

    const logoWrap = document.getElementById("logoWrap");
    const sandCanvas = document.getElementById("sandCanvas");
    const fallingCanvas = document.getElementById("fallingCanvas");
    const sandCtx = sandCanvas.getContext("2d");
    const fallingCtx = fallingCanvas.getContext("2d");

    const audio = document.getElementById("bgMusic");
    const audioBtn = document.getElementById("audioBtn");
    const audioText = document.getElementById("audioText");

    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let wrapRect = null;
    let particles = [];
    let settled = [];
    let pointer = {
      active: false,
      x: 0,
      y: 0,
      lastMove: 0
    };

    audio.volume = CONFIG.musicVolume;

    function resizeCanvas(canvas, ctx, rect) {
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      canvas.style.width = rect.width + "px";
      canvas.style.height = rect.height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function updateSizes() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      wrapRect = logoWrap.getBoundingClientRect();

      resizeCanvas(sandCanvas, sandCtx, wrapRect);

      const fallingRect = fallingCanvas.getBoundingClientRect();
      resizeCanvas(fallingCanvas, fallingCtx, fallingRect);

      createSettledSand();
      createFallingSand();
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function pickSandColor(alpha = 1) {
      const palette = [
        [242, 209, 137],
        [216, 174, 91],
        [188, 137, 63],
        [128, 84, 38],
        [255, 232, 174]
      ];
      const c = palette[Math.floor(Math.random() * palette.length)];
      return `rgba(${c[0]}, ${c[1]}, ${c[2]}, ${alpha})`;
    }

    function createSettledSand() {
      const isMobile = window.innerWidth < 760;
      const scale = isMobile ? CONFIG.sand.mobileParticleScale : CONFIG.sand.desktopParticleScale;
      const count = Math.floor(CONFIG.sand.totalSettledParticles * scale);
      settled = [];

      for (let i = 0; i < count; i++) {
        settled.push({
          x: rand(wrapRect.width * 0.08, wrapRect.width * 0.92),
          y: rand(wrapRect.height * 0.08, wrapRect.height * 0.94),
          r: rand(0.55, 1.75),
          a: rand(0.18, 0.62),
          color: pickSandColor(rand(0.18, 0.62)),
          phase: rand(0, Math.PI * 2),
          lift: 0
        });
      }
    }

    function createFallingSand() {
      const fallRect = fallingCanvas.getBoundingClientRect();
      const isMobile = window.innerWidth < 760;
      const scale = isMobile ? CONFIG.sand.mobileParticleScale : CONFIG.sand.desktopParticleScale;
      const count = Math.floor(CONFIG.sand.totalFallingParticles * scale);
      particles = [];

      for (let i = 0; i < count; i++) {
        particles.push({
          x: rand(fallRect.width * 0.1, fallRect.width * 0.9),
          y: rand(-fallRect.height * 0.65, -20),
          r: rand(0.65, 2.1),
          speed: rand(0.45, 1.9),
          drift: rand(-0.35, 0.35),
          sway: rand(0.006, 0.02),
          phase: rand(0, Math.PI * 2),
          color: pickSandColor(rand(0.35, 0.88)),
          life: rand(0.4, 1)
        });
      }
    }

    function drawSettledSand(time) {
      sandCtx.clearRect(0, 0, sandCanvas.width, sandCanvas.height);

      const progress = Math.min(1, Math.max(0, (time - startTime - 1700) / 4600));
      const revealY = wrapRect.height * (1 - progress);

      for (const p of settled) {
        if (p.y < revealY) continue;

        let dx = 0;
        let dy = 0;
        let glow = 0;

        if (pointer.active) {
          const distX = p.x - pointer.x;
          const distY = p.y - pointer.y;
          const dist = Math.sqrt(distX * distX + distY * distY);

          if (dist < CONFIG.interaction.radius) {
            const force = (1 - dist / CONFIG.interaction.radius) * CONFIG.interaction.strength;
            const angle = Math.atan2(distY, distX) + Math.sin(time * 0.004 + p.phase) * 1.4;
            dx = Math.cos(angle) * force * 13;
            dy = Math.sin(angle) * force * 7 - force * 8;
            glow = force;
          }
        }

        const shimmer = Math.sin(time * 0.002 + p.phase) * 0.18 + 0.82;
        sandCtx.beginPath();
        sandCtx.fillStyle = glow > 0.04 ? `rgba(255, 230, 165, ${0.28 + glow * 0.45})` : p.color;
        sandCtx.shadowColor = glow > 0.04 ? "rgba(255, 211, 132, 0.55)" : "transparent";
        sandCtx.shadowBlur = glow > 0.04 ? 8 : 0;
        sandCtx.arc(p.x + dx, p.y + dy, p.r * shimmer + glow * 1.4, 0, Math.PI * 2);
        sandCtx.fill();
      }

      sandCtx.shadowBlur = 0;
    }

    function drawFallingSand(time) {
      const rect = fallingCanvas.getBoundingClientRect();
      fallingCtx.clearRect(0, 0, rect.width, rect.height);

      const elapsed = time - startTime;
      const shouldFall = elapsed < CONFIG.sand.fallDurationMs;

      if (!shouldFall) {
        return;
      }

      const fadeOut = elapsed > 5000 ? 1 - (elapsed - 5000) / 1200 : 1;

      for (const p of particles) {
        p.y += p.speed;
        p.x += p.drift + Math.sin(time * p.sway + p.phase) * 0.28;

        if (p.y > rect.height * 0.88) {
          p.y = rand(-rect.height * 0.55, -20);
          p.x = rand(rect.width * 0.1, rect.width * 0.9);
        }

        fallingCtx.beginPath();
        fallingCtx.fillStyle = p.color.replace(/[\d.]+\)$/g, `${Math.max(0, fadeOut) * p.life})`);
        fallingCtx.shadowColor = "rgba(255, 207, 124, 0.36)";
        fallingCtx.shadowBlur = 5;
        fallingCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        fallingCtx.fill();
      }

      fallingCtx.shadowBlur = 0;
    }

    let startTime = performance.now();

    function animate(time) {
      drawSettledSand(time);
      drawFallingSand(time);

      if (pointer.active && time - pointer.lastMove > CONFIG.interaction.durationMs) {
        pointer.active = false;
      }

      requestAnimationFrame(animate);
    }

    function setPointerFromEvent(event) {
      const rect = sandCanvas.getBoundingClientRect();
      const clientX = event.touches ? event.touches[0].clientX : event.clientX;
      const clientY = event.touches ? event.touches[0].clientY : event.clientY;

      pointer.x = clientX - rect.left;
      pointer.y = clientY - rect.top;
      pointer.active = true;
      pointer.lastMove = performance.now();
    }

    logoWrap.addEventListener("mousemove", setPointerFromEvent);
    logoWrap.addEventListener("touchstart", setPointerFromEvent, { passive: true });
    logoWrap.addEventListener("touchmove", setPointerFromEvent, { passive: true });

    logoWrap.addEventListener("mouseleave", () => {
      pointer.lastMove = performance.now() - CONFIG.interaction.durationMs + 120;
    });

    audioBtn.addEventListener("click", async () => {
      try {
        if (audio.paused) {
          await audio.play();
          audioText.textContent = "On";
          audioBtn.setAttribute("aria-label", "Pause background music");
        } else {
          audio.pause();
          audioText.textContent = "Music";
          audioBtn.setAttribute("aria-label", "Play background music");
        }
      } catch (error) {
        audioText.textContent = "Tap again";
      }
    });

    window.addEventListener("resize", () => {
      updateSizes();
    });

    window.addEventListener("load", () => {
      updateSizes();
      requestAnimationFrame(animate);
    });
  </script>
</body>
</html>
